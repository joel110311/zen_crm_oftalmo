services:
  zen-crm:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://zencrm:950b719a13e682e057b42c7b11dd2213@zen-crm-db:5432/zencrm
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ALLOW_ENV_AI_FALLBACK=${ALLOW_ENV_AI_FALLBACK:-true}
      - WHATSAPP_GATEWAY_URL=http://whatsapp-gateway:8080
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN:-zencrm-local-admin-token}
      - WUZAPI_USER_TOKEN=${WUZAPI_USER_TOKEN:-zencrm-local-user-token}
      - WHATSAPP_INSTANCE_NAME=${WHATSAPP_INSTANCE_NAME:-zen-crm-local}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-superadmin@zencrm.local}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-super123}
      - INITIAL_ADMIN_NAME=${INITIAL_ADMIN_NAME:-Super Admin}
      - AUTH_SECRET=${AUTH_SECRET:-zencrm_local_auth_secret_2026}
      - AUTH_URL=${AUTH_URL:-http://localhost:3001}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3001}
      - WHATSAPP_WEBHOOK_BASE_URL=${WHATSAPP_WEBHOOK_BASE_URL:-http://host.docker.internal:3001}
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - TZ=${TZ:-America/Mexico_City}
    ports:
      - "3001:3000"
    volumes:
      - zen_crm_uploads:/app/public/uploads
    depends_on:
      - zen-crm-db
      - whatsapp-gateway
    networks:
      - zen-crm-local
    restart: unless-stopped

  whatsapp-gateway:
    image: asternic/wuzapi:latest
    environment:
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN:-zencrm-local-admin-token}
      - WUZAPI_GLOBAL_ENCRYPTION_KEY=${WUZAPI_GLOBAL_ENCRYPTION_KEY:-zencrm_local_encrypt_key_32abcde}
      - DB_USER=zencrm
      - DB_PASSWORD=950b719a13e682e057b42c7b11dd2213
      - DB_NAME=zencrm
      - DB_HOST=zen-crm-db
      - DB_PORT=5432
      - DB_SSLMODE=false
      - WEBHOOK_FORMAT=json
      - SESSION_DEVICE_NAME=${SESSION_DEVICE_NAME:-Zen CRM Local}
      - TZ=${TZ:-America/Mexico_City}
    ports:
      - "8080:8080"
    networks:
      - zen-crm-local
    restart: unless-stopped

  zen-crm-db:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: ghcr.io/joel110311/zen_crm_db:latest
    environment:
      - POSTGRES_USER=zencrm
      - POSTGRES_PASSWORD=950b719a13e682e057b42c7b11dd2213
      - POSTGRES_DB=zencrm
      - TZ=${TZ:-America/Mexico_City}
    volumes:
      - zen_crm_db_data:/var/lib/postgresql/data
    networks:
      - zen-crm-local
    restart: unless-stopped

volumes:
  zen_crm_db_data:
  zen_crm_uploads:

networks:
  zen-crm-local:
