version: '3.8'
services:
  # Zen CRM - Next.js Full Stack
  zen-crm:
    image: ghcr.io/joel110311/zen_crm:latest
    environment:
      # Connection to the dedicated pgvector container
      - DATABASE_URL=postgresql://zencrm:950b719a13e682e057b42c7b11dd2213@zen-crm-db:5432/zencrm

      # App Secrets
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - YCLOUD_API_KEY=b5df62fc3757e5f7ab51166591c6645c
      - YCLOUD_WHATSAPP_PHONE_ID=+524771075025
      - META_VERIFY_TOKEN=crmb51166591c6645c

      # Next.js & Host Settings
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - SociosNet
    volumes:
      - zen_crm_uploads:/app/public/uploads
    depends_on:
      - zen-crm-db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zen-crm.rule=Host(`crm.logicapp.net`)"
        - "traefik.http.routers.zen-crm.entrypoints=websecure"
        - "traefik.http.routers.zen-crm.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.zen-crm.loadbalancer.server.port=3000"
        - "traefik.docker.network=SociosNet"

  # Dedicated pgvector Database with Pre-loaded Data
  zen-crm-db:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: ghcr.io/joel110311/zen_crm_db:latest
    environment:
      - POSTGRES_USER=zencrm
      - POSTGRES_PASSWORD=950b719a13e682e057b42c7b11dd2213
      - POSTGRES_DB=zencrm
    volumes:
      - zen_crm_db_data:/var/lib/postgresql/data
    networks:
      - SociosNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  zen_crm_db_data:
  zen_crm_uploads:


networks:
  SociosNet:
    external: true
