version: "3.8"

services:
  zen-crm:
    image: ghcr.io/joel110311/zen_crm:latest
    environment:
      - DATABASE_URL=postgresql://zencrm:${POSTGRES_PASSWORD}@zen-crm-db:5432/${POSTGRES_DB}
      - WHATSAPP_GATEWAY_URL=http://whatsapp-gateway:8080
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN}
      - WUZAPI_USER_TOKEN=${WUZAPI_USER_TOKEN:-}
      - WHATSAPP_INSTANCE_NAME=${WHATSAPP_INSTANCE_NAME:-zen-crm}
      - WUZAPI_GLOBAL_ENCRYPTION_KEY=${WUZAPI_GLOBAL_ENCRYPTION_KEY}
      - ALLOW_ENV_AI_FALLBACK=${ALLOW_ENV_AI_FALLBACK:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
      - INITIAL_ADMIN_NAME=${INITIAL_ADMIN_NAME:-Owner}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - APP_BASE_URL=${APP_BASE_URL}
      - WHATSAPP_WEBHOOK_BASE_URL=${WHATSAPP_WEBHOOK_BASE_URL}
      - TZ=${TZ:-America/Mexico_City}
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - SociosNet
    volumes:
      - zen_crm_uploads:/app/public/uploads
    depends_on:
      - zen-crm-db
      - whatsapp-gateway
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zen-crm.rule=Host(`crm.logicapp.net`)"
        - "traefik.http.routers.zen-crm.entrypoints=websecure"
        - "traefik.http.routers.zen-crm.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.zen-crm.loadbalancer.server.port=3000"
        - "traefik.docker.network=SociosNet"

  whatsapp-gateway:
    image: asternic/wuzapi:latest
    environment:
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN}
      - WUZAPI_GLOBAL_ENCRYPTION_KEY=${WUZAPI_GLOBAL_ENCRYPTION_KEY}
      - DB_USER=zencrm
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_HOST=zen-crm-db
      - DB_PORT=5432
      - DB_SSLMODE=false
      - TZ=${TZ:-America/Mexico_City}
      - WEBHOOK_FORMAT=json
      - SESSION_DEVICE_NAME=${SESSION_DEVICE_NAME:-Zen CRM}
    networks:
      - SociosNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  zen-crm-db:
    image: ghcr.io/joel110311/zen_crm_db:latest
    environment:
      - POSTGRES_USER=zencrm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ:-America/Mexico_City}
    volumes:
      - zen_crm_db_data:/var/lib/postgresql/data
    networks:
      - SociosNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  zen_crm_db_data:
  zen_crm_uploads:

networks:
  SociosNet:
    external: true
