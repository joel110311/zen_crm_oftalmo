# Cambia solo estas lineas por cliente:
# 1. Host(`crm.cliente1.tudominio.com`)
# 2. AUTH_URL / APP_BASE_URL / WHATSAPP_WEBHOOK_BASE_URL
# 3. POSTGRES_PASSWORD
# 4. WUZAPI_ADMIN_TOKEN
# 5. WUZAPI_USER_TOKEN
# 6. WUZAPI_GLOBAL_ENCRYPTION_KEY
# 7. WUZAPI_GLOBAL_HMAC_KEY
# 8. WUZAPI_DB_PASSWORD
# 9. AUTH_SECRET
# 10. INITIAL_ADMIN_EMAIL / INITIAL_ADMIN_PASSWORD / INITIAL_ADMIN_NAME
# 11. STACK SLUG en labels: zencrm-cliente1

services:
  zen-crm:
    image: ghcr.io/joel110311/zen_crm_go:latest
    environment:
      - DATABASE_URL=postgresql://zencrm:change_this_postgres_password@${CRM_DB_HOST:-zen-crm-db}:5432/zencrm
      - WHATSAPP_GATEWAY_URL=http://whatsapp-gateway:8080
      - WUZAPI_ADMIN_TOKEN=change_this_admin_token
      - WUZAPI_USER_TOKEN=change_this_user_token
      - WHATSAPP_INSTANCE_NAME=zen-crm
      - WUZAPI_GLOBAL_ENCRYPTION_KEY=change_this_32_char_encryption_key
      - WUZAPI_GLOBAL_HMAC_KEY=change_this_32_char_hmac_key
      - PRISMA_LOG_QUERIES=false
      - ALLOW_ENV_AI_FALLBACK=false
      - OPENAI_API_KEY=
      - GEMINI_API_KEY=
      - INITIAL_ADMIN_EMAIL=owner@cliente1.com
      - INITIAL_ADMIN_PASSWORD=ChangeMe123!
      - INITIAL_ADMIN_NAME=Owner Cliente 1
      - AUTH_SECRET=change_this_auth_secret
      - AUTH_URL=https://crm.cliente1.tudominio.com
      - APP_BASE_URL=https://crm.cliente1.tudominio.com
      - WHATSAPP_WEBHOOK_BASE_URL=https://crm.cliente1.tudominio.com
      - TZ=America/Mexico_City
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - STARTUP_DB_MAX_ATTEMPTS=20
      - STARTUP_DB_RETRY_MS=5000
    networks:
      - SociosNet
    volumes:
      - zen_crm_uploads:/app/public/uploads
    depends_on:
      - zen-crm-db
      - whatsapp-gateway
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health?scope=ready').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zencrm-cliente1.rule=Host(`crm.cliente1.tudominio.com`)"
        - "traefik.http.routers.zencrm-cliente1.entrypoints=websecure"
        - "traefik.http.routers.zencrm-cliente1.tls=true"
        - "traefik.http.routers.zencrm-cliente1.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.zencrm-cliente1.loadbalancer.server.port=3000"
        - "traefik.docker.network=SociosNet"

  whatsapp-gateway:
    image: asternic/wuzapi:sha-4a20674
    environment:
      - WUZAPI_ADMIN_TOKEN=change_this_admin_token
      - WUZAPI_GLOBAL_ENCRYPTION_KEY=change_this_32_char_encryption_key
      - WUZAPI_GLOBAL_HMAC_KEY=change_this_32_char_hmac_key
      - DB_USER=wuzapi
      - DB_PASSWORD=change_this_wuzapi_db_password
      - DB_NAME=wuzapi
      - DB_HOST=${WUZAPI_DB_HOST:-whatsapp-db}
      - DB_PORT=5432
      - DB_SSLMODE=false
      - TZ=America/Mexico_City
      - WEBHOOK_FORMAT=json
      - SESSION_DEVICE_NAME=Zen CRM Cliente 1
    networks:
      - SociosNet
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  whatsapp-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=wuzapi
      - POSTGRES_PASSWORD=change_this_wuzapi_db_password
      - POSTGRES_DB=wuzapi
      - TZ=America/Mexico_City
    volumes:
      - wuzapi_db_data:/var/lib/postgresql/data
    networks:
      - SociosNet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wuzapi -d wuzapi"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  zen-crm-db:
    image: ghcr.io/joel110311/zen_crm_go_db:latest
    environment:
      - POSTGRES_USER=zencrm
      - POSTGRES_PASSWORD=change_this_postgres_password
      - POSTGRES_DB=zencrm
      - TZ=America/Mexico_City
    volumes:
      - zen_crm_db_data:/var/lib/postgresql/data
    networks:
      - SociosNet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zencrm -d zencrm"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  zen_crm_db_data:
  zen_crm_uploads:
  wuzapi_db_data:

networks:
  SociosNet:
    external: true
